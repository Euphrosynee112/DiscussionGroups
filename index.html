<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Generator v2.0</title>
    <link rel="stylesheet" href="./home.css" />
  </head>
  <body>
    <main class="home-scene">
      <section class="phone-home" aria-label="手机首页">
        <header class="status-bar" aria-label="系统状态栏">
          <span id="status-time" class="status-time">00:00</span>
          <div class="status-icons" aria-hidden="true">
            <span class="signal-bars">
              <i></i>
              <i></i>
              <i></i>
              <i></i>
            </span>
            <span class="wifi-icon"></span>
            <span class="battery">
              <span class="battery-level"></span>
            </span>
          </div>
        </header>

        <section class="clock-panel" aria-label="本地时间">
          <p id="phone-date" class="phone-date">3月30日 星期一</p>
          <h1 id="phone-clock" class="phone-clock">10:00</h1>
        </section>

        <section class="desk-grid" aria-label="桌面卡片和图标">
          <div class="desk-card desk-card--photo">
            <div class="desk-card__symbol">✦</div>
            <div>
              <p class="desk-card__title">今日灵感</p>
              <p class="desk-card__text">把 v2.0 首页改成更像手机桌面的轻拟物风格。</p>
            </div>
          </div>

          <button
            class="app-shortcut desk-item-chat"
            type="button"
            data-open-app="messages"
            aria-label="打开 Chat 私信页"
          >
            <span class="app-shortcut__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 4C7.03 4 3 7.36 3 11.5c0 2.05.99 3.91 2.6 5.26-.08.81-.36 1.83-1.15 2.75 1.56-.18 2.97-.73 4.13-1.57A10.7 10.7 0 0 0 12 19c4.97 0 9-3.36 9-7.5S16.97 4 12 4Z"
                  fill="currentColor"
                />
                <circle cx="9" cy="11.5" r="1" fill="#f5f8fc" />
                <circle cx="12" cy="11.5" r="1" fill="#f5f8fc" />
                <circle cx="15" cy="11.5" r="1" fill="#f5f8fc" />
              </svg>
            </span>
            <span class="app-shortcut__label">Chat</span>
          </button>

          <div class="app-shortcut app-shortcut--muted desk-item-now" aria-hidden="true">
            <span class="app-shortcut__icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="8" fill="currentColor" />
                <path d="M12 8v4l3 2" stroke="#f5f8fc" stroke-width="2" stroke-linecap="round" />
              </svg>
            </span>
            <span class="app-shortcut__label">Now</span>
          </div>

          <div class="app-shortcut app-shortcut--muted desk-item-memory" aria-hidden="true">
            <span class="app-shortcut__icon app-shortcut__icon--heart">♥</span>
            <span class="app-shortcut__label">纪念日</span>
          </div>

          <button
            class="app-shortcut desk-item-x"
            type="button"
            data-open-app="home"
            aria-label="打开 X 讨论页"
          >
            <span class="app-shortcut__icon app-shortcut__icon--x">X</span>
            <span class="app-shortcut__label">X</span>
          </button>

          <div class="desk-card desk-card--note">
            <div class="desk-card__symbol desk-card__symbol--heart">♡</div>
            <div>
              <p class="desk-card__title">今日提醒</p>
              <p class="desk-card__text">点击 X 进入讨论页，点击 Chat 查看私信页。</p>
            </div>
          </div>
        </section>

        <footer class="dock" aria-label="底部快捷入口">
          <button class="dock-app" type="button" aria-label="短信">
            <span class="dock-app__icon">✉</span>
            <span class="dock-app__label">短信</span>
          </button>
          <button
            id="home-settings-trigger"
            class="dock-app"
            type="button"
            aria-label="设置"
          >
            <span class="dock-app__icon">⚙</span>
            <span class="dock-app__label">设置</span>
          </button>
          <button class="dock-app" type="button" aria-label="记忆">
            <span class="dock-app__icon">◐</span>
            <span class="dock-app__label">记忆</span>
          </button>
        </footer>
      </section>
    </main>

    <section
      id="home-settings-modal"
      class="home-settings-modal"
      aria-hidden="true"
      hidden
      style="display: none"
    >
      <div class="home-settings-modal__backdrop" data-close-home-settings></div>
      <div
        class="home-settings-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-label="API 配置缓存与一键切换"
      >
        <div class="home-settings-modal__head">
          <div>
            <p class="home-settings-kicker">API Presets</p>
            <h2 class="home-settings-title">API 配置缓存与一键切换</h2>
          </div>
          <button
            id="home-settings-close-btn"
            class="home-settings-close"
            type="button"
            aria-label="关闭设置"
          >
            ×
          </button>
        </div>

        <div class="home-settings-modal__body">
          <p class="home-settings-tip">
            这里的 API 预设会和讨论页共用同一份本地缓存；切换后，进入“X”或“Chat”会直接使用当前配置。
          </p>
          <p id="home-active-config-summary" class="home-settings-summary"></p>

          <div class="home-api-form-grid">
            <label class="home-field">
              <span>接口类型</span>
              <select id="home-api-mode">
                <option value="openai">DeepSeek / OpenAI 兼容接口</option>
                <option value="gemini">Gemini API</option>
                <option value="generic">通用 JSON 接口</option>
              </select>
            </label>

            <label class="home-field">
              <span>模型名称</span>
              <input id="home-api-model" type="text" placeholder="deepseek-chat" />
            </label>

            <label class="home-field home-field--full">
              <span>API 地址</span>
              <input
                id="home-api-endpoint"
                type="url"
                placeholder="https://api.deepseek.com/chat/completions"
              />
            </label>

            <label class="home-field home-field--full">
              <span>API Key / Bearer Token</span>
              <input
                id="home-api-token"
                type="password"
                placeholder="输入用于请求的密钥"
              />
            </label>
          </div>

          <div class="home-api-toolbar">
            <label class="home-field home-field--grow">
              <span>配置名称（可选）</span>
              <input
                id="home-api-config-name-input"
                type="text"
                maxlength="20"
                placeholder="例如：DeepSeek-主账号 / Gemini-测试"
              />
            </label>
            <button id="home-api-config-save-btn" class="home-primary-button" type="button">
              保存当前 API 配置
            </button>
          </div>

          <p id="home-api-config-status" class="home-settings-status" aria-live="polite"></p>
          <div id="home-api-config-list" class="home-api-config-list"></div>

          <div class="home-translation-api-settings">
            <label class="home-checkbox-row">
              <input id="home-translation-api-enabled" type="checkbox" />
              <span>启用翻译专用 API</span>
            </label>
            <label class="home-field home-field--full">
              <span>翻译专用配置</span>
              <select id="home-translation-api-config-select"></select>
              <span class="home-field-hint">
                启用后，帖子与回复翻译会优先使用这里选中的已缓存 API 配置；关闭后沿用当前内容生成配置。
              </span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <section
      id="home-browser-modal"
      class="home-browser-modal"
      aria-hidden="true"
      hidden
      style="display: none"
    >
      <div class="home-browser-modal__backdrop" data-close-home-browser></div>
      <div class="home-browser-modal__panel" role="dialog" aria-modal="true" aria-label="应用弹窗">
        <div class="home-browser-modal__head">
          <div>
            <p id="home-browser-kicker" class="home-browser-kicker">Pulse App</p>
            <h2 id="home-browser-title" class="home-browser-title">讨论页</h2>
          </div>
          <button
            id="home-browser-close-btn"
            class="home-settings-close"
            type="button"
            aria-label="关闭弹窗"
          >
            ×
          </button>
        </div>

        <div class="home-browser-modal__viewport">
          <iframe
            id="home-browser-frame"
            class="home-browser-modal__frame"
            title="应用内容"
            loading="eager"
          ></iframe>
        </div>
      </div>
    </section>

    <script src="./home.js"></script>
  </body>
</html>
