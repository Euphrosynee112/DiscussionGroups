<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Pulse Generator · 日程</title>
    <link rel="stylesheet" href="./schedule.css?v=20260406-180743" />
  </head>
  <body>
    <a class="desktop-entry" href="./index.html" aria-label="返回手机首页">← 首页</a>

    <main class="schedule-app">
      <section class="schedule-shell" aria-label="日程">
        <header class="schedule-topbar">
          <button
            id="schedule-back-btn"
            class="schedule-topbar__button"
            type="button"
            aria-label="返回首页"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15 6l-6 6 6 6"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <div class="schedule-topbar__body">
            <p class="schedule-topbar__kicker">Calendar</p>
            <h1 class="schedule-topbar__title">日程</h1>
          </div>
          <div class="schedule-topbar__actions">
            <button
              id="schedule-filter-btn"
              class="schedule-topbar__button"
              type="button"
              aria-label="筛选查看对象"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4.5 6.5h15m-12 5h9m-6 5h3"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.9"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <button
              id="schedule-clear-range-btn"
              class="schedule-topbar__button"
              type="button"
              aria-label="按时间范围清除日程"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M8.2 7.6h7.6m-6.7 0 .4-1.4A1.3 1.3 0 0 1 10.8 5h2.4a1.3 1.3 0 0 1 1.25 1.2l.35 1.4m-8.3 0h10.8m-9.7 0 .65 9.25a2 2 0 0 0 2 1.86h3.5a2 2 0 0 0 2-1.86l.65-9.25M10.2 10.4v5.2M13.8 10.4v5.2"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <button
              id="schedule-places-btn"
              class="schedule-topbar__button"
              type="button"
              aria-label="管理常用地点"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 20s6-4.9 6-9.2A6 6 0 0 0 6 10.8C6 15.1 12 20 12 20Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <circle cx="12" cy="10" r="2.1" fill="none" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </button>
            <button
              id="schedule-add-btn"
              class="schedule-topbar__button"
              type="button"
              aria-label="新增日程"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5v14M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <p id="schedule-status" class="schedule-status" aria-live="polite"></p>

        <section class="schedule-toolbar" aria-label="日历工具栏">
          <div id="schedule-view-switch" class="schedule-view-switch">
            <button class="schedule-view-switch__item" type="button" data-view="day">日</button>
            <button class="schedule-view-switch__item" type="button" data-view="week">周</button>
            <button class="schedule-view-switch__item" type="button" data-view="month">月</button>
          </div>
          <div class="schedule-toolbar__nav">
            <button id="schedule-prev-btn" class="schedule-nav-btn" type="button" aria-label="上一页">
              ‹
            </button>
            <button id="schedule-today-btn" class="schedule-nav-btn schedule-nav-btn--today" type="button">
              今天
            </button>
            <button id="schedule-next-btn" class="schedule-nav-btn" type="button" aria-label="下一页">
              ›
            </button>
          </div>
        </section>

        <section class="schedule-range" aria-label="当前时间范围">
          <p id="schedule-range-label" class="schedule-range__label"></p>
          <p id="schedule-range-subtitle" class="schedule-range__subtitle"></p>
        </section>

        <section id="schedule-content" class="schedule-content" aria-live="polite"></section>
      </section>
    </main>

    <section id="schedule-editor-modal" class="schedule-modal" hidden aria-hidden="true">
      <div class="schedule-modal__backdrop"></div>
      <div class="schedule-modal__panel" role="dialog" aria-modal="true" aria-label="新增日程">
        <div class="schedule-modal__head">
          <strong id="schedule-editor-title">新增日程</strong>
          <button id="schedule-editor-close-btn" class="schedule-modal__close" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <form id="schedule-editor-form" class="schedule-editor">
          <label class="schedule-field">
            <span>日程标题</span>
            <input
              id="schedule-title-input"
              type="text"
              maxlength="40"
              placeholder="例如：练舞、直播、彩排、陪家人吃饭"
              autocomplete="off"
            />
          </label>

          <label class="schedule-field">
            <span>新增方式</span>
            <select id="schedule-type-select">
              <option value="day">按天</option>
              <option value="hour">按小时</option>
              <option value="week">按周</option>
            </select>
            <small id="schedule-type-hint" class="schedule-field__hint"></small>
          </label>

          <label class="schedule-field">
            <span>归属</span>
            <select id="schedule-owner-type-select">
              <option value="user">用户</option>
              <option value="contact">角色</option>
            </select>
          </label>

          <label id="schedule-owner-contact-field" class="schedule-field">
            <span>角色</span>
            <select id="schedule-owner-contact-select"></select>
          </label>

          <section id="schedule-visibility-field" class="schedule-field schedule-field--group">
            <div class="schedule-field__head">
              <span>用户日程可见范围</span>
              <label class="schedule-inline-check">
                <input id="schedule-visible-all-input" type="checkbox" />
                <span>全部可见</span>
              </label>
            </div>
            <div id="schedule-visible-contacts" class="schedule-visibility-list"></div>
            <small class="schedule-field__hint">
              只有勾选到的角色，才会在对话时感知这条用户日程。
            </small>
          </section>

          <section id="schedule-companion-field" class="schedule-field schedule-field--group">
            <div class="schedule-field__head">
              <span>同行人</span>
            </div>
            <div id="schedule-companion-options" class="schedule-visibility-list"></div>
            <small class="schedule-field__hint">
              被选中的同行人会同步拥有这一条同时间的日程；聊天时也会知道自己和谁同行。
            </small>
          </section>

          <section
            id="schedule-notify-companions-field"
            class="schedule-field schedule-field--group"
            hidden
          >
            <div class="schedule-field__head">
              <span>邀请同行人</span>
            </div>
            <label class="schedule-inline-check schedule-inline-check--stacked">
              <input id="schedule-notify-companions-input" type="checkbox" />
              <span>是否通知同行人</span>
            </label>
            <small class="schedule-field__hint">
              勾选后会向已选同行人发送日程邀请卡片，并调用 API 让角色决定接受或拒绝；最多同时发起 3 个邀请请求。
            </small>
          </section>

          <label class="schedule-field">
            <span>地点</span>
            <select id="schedule-place-select"></select>
            <small class="schedule-field__hint">
              进入 1v1 聊天时，会按当前时间命中的日程地点刷新用户 / 角色位置；双方地点相同会自动判定为线下。
            </small>
          </label>

          <label class="schedule-field">
            <span>日期</span>
            <input id="schedule-date-input" type="date" />
          </label>

          <div id="schedule-time-grid" class="schedule-time-grid">
            <label class="schedule-field">
              <span>开始时间</span>
              <input id="schedule-start-time-input" type="time" />
            </label>
            <label class="schedule-field">
              <span>结束时间</span>
              <input id="schedule-end-time-input" type="time" />
            </label>
          </div>

          <p id="schedule-editor-status" class="schedule-editor-status" aria-live="polite"></p>

          <div class="schedule-modal__actions">
            <button id="schedule-delete-btn" class="schedule-modal__button schedule-modal__button--danger" type="button" hidden>
              删除
            </button>
            <button id="schedule-editor-cancel-btn" class="schedule-modal__button schedule-modal__button--ghost" type="button">
              取消
            </button>
            <button class="schedule-modal__button" type="submit">保存日程</button>
          </div>
        </form>
      </div>
    </section>

    <section id="schedule-filter-modal" class="schedule-modal" hidden aria-hidden="true">
      <div class="schedule-modal__backdrop"></div>
      <div class="schedule-modal__panel" role="dialog" aria-modal="true" aria-label="筛选日程">
        <div class="schedule-modal__head">
          <strong>筛选查看对象</strong>
          <button id="schedule-filter-close-btn" class="schedule-modal__close" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <div class="schedule-editor">
          <section class="schedule-field schedule-field--group">
            <div class="schedule-field__head">
              <span>显示谁的日程</span>
              <div class="schedule-filter-toolbar">
                <button id="schedule-filter-select-all-btn" class="schedule-filter-chip" type="button">
                  全选
                </button>
                <button id="schedule-filter-clear-btn" class="schedule-filter-chip" type="button">
                  清空筛选
                </button>
              </div>
            </div>
            <div id="schedule-filter-options" class="schedule-visibility-list"></div>
            <small class="schedule-field__hint">支持单选或多选；不改变日历样式，只筛选显示对象。</small>
          </section>

          <p id="schedule-filter-status" class="schedule-editor-status" aria-live="polite"></p>

          <div class="schedule-modal__actions">
            <button id="schedule-filter-cancel-btn" class="schedule-modal__button schedule-modal__button--ghost" type="button">
              取消
            </button>
            <button id="schedule-filter-apply-btn" class="schedule-modal__button" type="button">
              应用筛选
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="schedule-clear-modal" class="schedule-modal" hidden aria-hidden="true">
      <div class="schedule-modal__backdrop"></div>
      <div class="schedule-modal__panel" role="dialog" aria-modal="true" aria-label="清除日程">
        <div class="schedule-modal__head">
          <strong>清除某段时间内的日程</strong>
          <button id="schedule-clear-close-btn" class="schedule-modal__close" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <form id="schedule-clear-form" class="schedule-editor">
          <label class="schedule-field">
            <span>清除对象</span>
            <select id="schedule-clear-actor-select"></select>
            <small class="schedule-field__hint">
              只会清除该对象在所选时间段内参与的行程；若只是同行人，则仅移除该同行关联。
            </small>
          </label>

          <section class="schedule-field schedule-field--group">
            <div class="schedule-field__head">
              <span>快捷预设</span>
            </div>
            <div class="schedule-filter-toolbar">
              <button id="schedule-clear-preset-today-btn" class="schedule-filter-chip" type="button">
                今天
              </button>
              <button id="schedule-clear-preset-week-btn" class="schedule-filter-chip" type="button">
                本周
              </button>
              <button id="schedule-clear-preset-month-btn" class="schedule-filter-chip" type="button">
                本月
              </button>
            </div>
          </section>

          <div class="schedule-time-grid">
            <label class="schedule-field">
              <span>开始日期</span>
              <input id="schedule-clear-start-date-input" type="date" />
            </label>
            <label class="schedule-field">
              <span>开始时间</span>
              <input id="schedule-clear-start-time-input" type="time" />
            </label>
          </div>

          <div class="schedule-time-grid">
            <label class="schedule-field">
              <span>结束日期</span>
              <input id="schedule-clear-end-date-input" type="date" />
            </label>
            <label class="schedule-field">
              <span>结束时间</span>
              <input id="schedule-clear-end-time-input" type="time" />
            </label>
          </div>

          <p id="schedule-clear-status" class="schedule-editor-status" aria-live="polite"></p>

          <div class="schedule-modal__actions">
            <button id="schedule-clear-cancel-btn" class="schedule-modal__button schedule-modal__button--ghost" type="button">
              取消
            </button>
            <button class="schedule-modal__button schedule-modal__button--danger" type="submit">
              一键清除
            </button>
          </div>
        </form>
      </div>
    </section>

    <section id="schedule-places-modal" class="schedule-modal" hidden aria-hidden="true">
      <div class="schedule-modal__backdrop"></div>
      <div class="schedule-modal__panel" role="dialog" aria-modal="true" aria-label="常用地点">
        <div class="schedule-modal__head">
          <strong>常用地点</strong>
          <div class="schedule-modal__head-actions">
            <button id="schedule-places-add-btn" class="schedule-filter-chip" type="button">
              新增
            </button>
            <button id="schedule-places-close-btn" class="schedule-modal__close" type="button" aria-label="关闭">
              ×
            </button>
          </div>
        </div>

        <div class="schedule-editor">
          <p id="schedule-places-status" class="schedule-editor-status" aria-live="polite"></p>
          <section id="schedule-places-list" class="schedule-places-list" aria-live="polite"></section>
        </div>
      </div>
    </section>

    <section id="schedule-place-editor-modal" class="schedule-modal" hidden aria-hidden="true">
      <div class="schedule-modal__backdrop"></div>
      <div class="schedule-modal__panel" role="dialog" aria-modal="true" aria-label="编辑常用地点">
        <div class="schedule-modal__head">
          <strong id="schedule-place-editor-title">新增地点</strong>
          <button id="schedule-place-editor-close-btn" class="schedule-modal__close" type="button" aria-label="关闭">
            ×
          </button>
        </div>

        <form id="schedule-place-editor-form" class="schedule-editor">
          <label class="schedule-field">
            <span>地点名称</span>
            <input
              id="schedule-place-name-input"
              type="text"
              maxlength="40"
              placeholder="例如：自己家、公司、健身房"
              autocomplete="off"
            />
          </label>

          <label class="schedule-field">
            <span>地点类型</span>
            <select id="schedule-place-type-select">
              <option value="home">住宅</option>
              <option value="family">家庭</option>
              <option value="work">工作</option>
              <option value="school">学校</option>
              <option value="leisure">娱乐</option>
              <option value="other">其他</option>
            </select>
          </label>

          <label class="schedule-field">
            <span>地点别名</span>
            <textarea
              id="schedule-place-aliases-input"
              rows="4"
              maxlength="400"
              placeholder="一行一个别名，例如：&#10;回家&#10;工位&#10;排练厅"
            ></textarea>
          </label>

          <label class="schedule-field">
            <span>地点特殊性</span>
            <textarea
              id="schedule-place-traits-input"
              rows="5"
              maxlength="800"
              placeholder="补充这个地点对聊天场景的影响，例如：通常很安静，方便长时间聊天。"
            ></textarea>
          </label>

          <label class="schedule-field">
            <span>谁知道这个地点</span>
            <select id="schedule-place-visibility-select">
              <option value="self">仅自己知道</option>
              <option value="all_contacts">全部角色都知道</option>
              <option value="selected_contacts">仅指定角色知道</option>
            </select>
          </label>

          <section
            id="schedule-place-visible-contacts-field"
            class="schedule-field schedule-field--group"
            hidden
          >
            <div class="schedule-field__head">
              <span>可见角色</span>
            </div>
            <div id="schedule-place-visible-contacts-list" class="schedule-visibility-list"></div>
          </section>

          <p id="schedule-place-editor-status" class="schedule-editor-status" aria-live="polite"></p>

          <div class="schedule-modal__actions">
            <button
              id="schedule-place-editor-delete-btn"
              class="schedule-modal__button schedule-modal__button--danger"
              type="button"
              hidden
            >
              删除
            </button>
            <button
              id="schedule-place-editor-cancel-btn"
              class="schedule-modal__button schedule-modal__button--ghost"
              type="button"
            >
              取消
            </button>
            <button class="schedule-modal__button" type="submit">保存地点</button>
          </div>
        </form>
      </div>
    </section>

    <script src="./prompt-config.js?v=20260406-213101"></script>
    <script src="./privacy-allowlist.js?v=20260403-165212"></script>
    <script src="./pulse-privacy-cover.js?v=20260403-170109"></script>
    <script src="./pulse-message-banner.js?v=20260403-165212"></script>
    <script src="./api-log.js?v=20260405-231617"></script>
    <script src="./schedule.js?v=20260406-180743"></script>
  </body>
</html>
