<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Generator · Chat</title>
    <link rel="stylesheet" href="./messages.css?v=20260330c" />
  </head>
  <body>
    <a class="desktop-entry" href="./index.html" aria-label="返回手机首页">← 首页</a>

    <main class="messages-app">
      <section class="messages-card" aria-label="私信页">
        <header class="messages-card__head">
          <div>
            <p class="messages-kicker">Messages</p>
            <h1>私信会话</h1>
          </div>
          <div class="messages-card__actions">
            <button id="messages-generate-btn" class="ghost-button" type="button">新建消息</button>
            <button
              id="messages-embedded-close-btn"
              class="messages-embedded-close ghost-button"
              type="button"
              aria-label="关闭私信页"
            >
              关闭
            </button>
          </div>
        </header>

        <p id="messages-status" class="messages-status">
          这里是独立的 Chat 页；消息仅保存在当前浏览器。
        </p>

        <div id="messages-list" class="messages-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="./messages.js?v=20260330c"></script>
  </body>
</html>
