<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Pulse Generator · Chat</title>
    <link rel="stylesheet" href="./messages.css?v=20260402e" />
  </head>
  <body>
    <a class="desktop-entry" href="./index.html" aria-label="返回手机首页">← 首页</a>

    <main class="messages-app">
      <section class="messages-shell" aria-label="Chat 首页">
        <header class="messages-topbar">
          <button
            id="messages-nav-btn"
            class="messages-topbar__icon"
            type="button"
            aria-label="返回"
            hidden
          ></button>
          <h1 id="messages-page-title" class="messages-topbar__title">微信</h1>
          <div class="messages-topbar__actions">
            <button
              id="messages-chat-settings-btn"
              class="messages-topbar__icon"
              type="button"
              aria-label="对话设置"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 4.8 13.6 3l1.8 1.7 2.5.1.2 2.5L20 9l-1.8 1.8.1 2.5-2.5.2-1.8 1.8-1.8-1.8-2.5-.2.1-2.5L4 9l1.8-1.7.2-2.5 2.5-.1L10.4 3Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
                <circle cx="12" cy="9.1" r="2.35" fill="none" stroke="currentColor" stroke-width="1.6" />
              </svg>
            </button>
            <button
              id="messages-search-btn"
              class="messages-topbar__icon"
              type="button"
              aria-label="搜索"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
                <path
                  d="M16 16l4 4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <button
              id="messages-add-btn"
              class="messages-topbar__icon"
              type="button"
              aria-label="更多操作"
              hidden
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 5v14M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <p id="messages-status" class="messages-status" aria-live="polite" hidden></p>

        <section id="messages-search-section" class="messages-search-section" hidden>
          <label class="messages-search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
              <path
                d="M16 16l4 4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            <input
              id="messages-search-input"
              type="search"
              placeholder="搜索"
              autocomplete="off"
            />
          </label>
        </section>

        <section id="messages-content" class="messages-content" aria-live="polite"></section>

        <nav id="messages-tabbar" class="messages-tabbar" aria-label="底部功能页签">
          <button class="messages-tabbar__item is-active" type="button" data-tab="chat">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M5.5 7.5A3.5 3.5 0 0 1 9 4h6a3.5 3.5 0 0 1 3.5 3.5V12A3.5 3.5 0 0 1 15 15.5H11l-3.8 3.1c-.5.4-1.2 0-1.2-.7v-2.5A3.5 3.5 0 0 1 5.5 12Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
            <span>聊天</span>
          </button>
          <button class="messages-tabbar__item" type="button" data-tab="contacts">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M6 18.2c1.2-2.7 3.3-4.1 6-4.1s4.8 1.4 6 4.1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <span>通讯录</span>
          </button>
          <button class="messages-tabbar__item" type="button" data-tab="me">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M7 18.5c1.1-2.5 2.8-3.8 5-3.8s3.9 1.3 5 3.8"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <span>我</span>
          </button>
        </nav>
      </section>
    </main>

    <section id="messages-profile-modal" class="messages-sheet-modal" hidden aria-hidden="true">
      <div class="messages-sheet-modal__panel" role="dialog" aria-modal="true" aria-label="编辑个人资料">
        <header class="messages-sheet-modal__header">
          <button
            id="messages-profile-modal-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭资料编辑"
          >
            取消
          </button>
          <strong>编辑资料</strong>
          <button
            id="messages-profile-save-btn"
            class="messages-sheet-modal__button messages-sheet-modal__button--primary"
            type="submit"
            form="messages-profile-form"
          >
            保存
          </button>
        </header>

        <form id="messages-profile-form" class="messages-editor-form">
          <section class="messages-avatar-editor">
            <div id="messages-profile-avatar-preview" class="messages-avatar-editor__preview">WG</div>
            <div class="messages-avatar-editor__content">
              <strong>头像</strong>
              <p>支持上传头像图片；未上传时默认使用昵称首字。</p>
              <div class="messages-avatar-editor__actions">
                <label class="messages-upload-button">
                  上传头像
                  <input
                    id="messages-profile-avatar-file-input"
                    type="file"
                    accept="image/*"
                    hidden
                  />
                </label>
                <button
                  id="messages-profile-avatar-reset-btn"
                  class="messages-text-button"
                  type="button"
                >
                  使用默认
                </button>
              </div>
            </div>
          </section>

          <label class="messages-form-field">
            <span>用户名</span>
            <input
              id="messages-profile-username-input"
              type="text"
              maxlength="32"
              placeholder="输入用户名"
              autocomplete="off"
            />
          </label>

          <label class="messages-form-field">
            <span>微信号</span>
            <input
              id="messages-profile-userid-input"
              type="text"
              maxlength="48"
              placeholder="输入微信号"
              autocomplete="off"
            />
          </label>

          <label class="messages-form-field messages-form-field--textarea">
            <span>用户人设</span>
            <textarea
              id="messages-profile-persona-input"
              rows="6"
              maxlength="1200"
              placeholder="这个内容不会在页面直接展示，但会被论坛、Bubble 和对话 prompt 调用。"
            ></textarea>
          </label>

          <p id="messages-profile-editor-status" class="messages-editor-status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section id="messages-contact-modal" class="messages-sheet-modal" hidden aria-hidden="true">
      <div class="messages-sheet-modal__panel" role="dialog" aria-modal="true" aria-label="编辑联系人">
        <header class="messages-sheet-modal__header">
          <button
            id="messages-contact-modal-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭联系人编辑"
          >
            取消
          </button>
          <strong id="messages-contact-modal-title">新建联系人</strong>
          <button
            id="messages-contact-save-btn"
            class="messages-sheet-modal__button messages-sheet-modal__button--primary"
            type="submit"
            form="messages-contact-form"
          >
            保存
          </button>
        </header>

        <form id="messages-contact-form" class="messages-editor-form">
          <section class="messages-avatar-editor">
            <div id="messages-contact-avatar-preview" class="messages-avatar-editor__preview">联</div>
            <div class="messages-avatar-editor__content">
              <strong>头像</strong>
              <p>支持上传头像图片；未上传时默认使用姓名首字。</p>
              <div class="messages-avatar-editor__actions">
                <label class="messages-upload-button">
                  上传头像
                  <input
                    id="messages-contact-avatar-file-input"
                    type="file"
                    accept="image/*"
                    hidden
                  />
                </label>
                <button
                  id="messages-contact-avatar-reset-btn"
                  class="messages-text-button"
                  type="button"
                >
                  使用默认
                </button>
              </div>
            </div>
          </section>

          <label class="messages-form-field">
            <span>姓名</span>
            <input
              id="messages-contact-name-input"
              type="text"
              maxlength="32"
              placeholder="输入联系人姓名"
              autocomplete="off"
            />
          </label>

          <label class="messages-form-field messages-form-field--textarea">
            <span>人物人设</span>
            <textarea
              id="messages-contact-persona-input"
              rows="6"
              maxlength="1200"
              placeholder="记录这个联系人在对话中的身份、性格、说话方式和背景。"
            ></textarea>
          </label>

          <label class="messages-form-field messages-form-field--textarea">
            <span>用户特别人设</span>
            <textarea
              id="messages-contact-special-persona-input"
              rows="5"
              maxlength="800"
              placeholder="可选。记录这个角色对用户的特别认知，例如相处印象、偏爱点、介意点或私人滤镜。"
            ></textarea>
          </label>

          <p id="messages-contact-editor-status" class="messages-editor-status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section
      id="messages-picker-modal"
      class="messages-sheet-modal"
      hidden
      aria-hidden="true"
    >
      <div class="messages-sheet-modal__panel messages-sheet-modal__panel--picker" role="dialog" aria-modal="true" aria-label="发起会话">
        <header class="messages-sheet-modal__header">
          <button
            id="messages-picker-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭会话选择"
          >
            取消
          </button>
          <strong>发起会话</strong>
          <span class="messages-sheet-modal__button"></span>
        </header>

        <section id="messages-picker-list" class="messages-picker-list" aria-live="polite"></section>
      </div>
    </section>

    <section
      id="messages-chat-settings-modal"
      class="messages-sheet-modal"
      hidden
      aria-hidden="true"
    >
      <div
        class="messages-sheet-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-label="对话回复设置"
      >
        <header class="messages-sheet-modal__header">
          <button
            id="messages-chat-settings-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭对话设置"
          >
            取消
          </button>
          <strong>对话设置</strong>
          <button
            id="messages-chat-settings-save-btn"
            class="messages-sheet-modal__button messages-sheet-modal__button--primary"
            type="submit"
            form="messages-chat-settings-form"
          >
            保存
          </button>
        </header>

        <form id="messages-chat-settings-form" class="messages-editor-form">
          <label class="messages-form-field">
            <span>历史聊天轮数</span>
            <input
              id="messages-chat-history-rounds-input"
              type="number"
              min="1"
              max="20"
              inputmode="numeric"
              placeholder="输入保留轮数"
              autocomplete="off"
            />
            <small class="messages-form-field__hint">
              仅会把最近 N 轮聊天带给 API；数值越大，上下文越完整。
            </small>
          </label>

          <label class="messages-form-field">
            <span>单次最多分行</span>
            <input
              id="messages-chat-reply-sentence-limit-input"
              type="number"
              min="1"
              max="20"
              inputmode="numeric"
              placeholder="默认 7 行"
              autocomplete="off"
            />
            <small class="messages-form-field__hint">
              AI 会尽量把一次回复拆成不超过 N 行；聊天页会按行逐条气泡弹出。
            </small>
          </label>

          <label class="messages-form-field">
            <span>察觉感知轮数</span>
            <input
              id="messages-chat-awareness-rounds-input"
              type="number"
              min="1"
              max="200"
              inputmode="numeric"
              placeholder="默认 15 轮"
              autocomplete="off"
            />
            <small class="messages-form-field__hint">
              每成功获取满 N 次 API 回复后，会按“察觉”的灵敏度概率判断一次是否主动想起那条额外信息。
            </small>
          </label>

          <label class="messages-toggle-field">
            <div class="messages-toggle-field__body">
              <strong>时间感知</strong>
              <p>开启后，会把当前本地日期、星期与时间一并带给 AI。</p>
            </div>
            <span class="messages-switch">
              <input id="messages-chat-time-awareness-input" type="checkbox" />
              <span class="messages-switch__slider"></span>
            </span>
          </label>

          <label class="messages-form-field">
            <span>日程感知窗口（分钟）</span>
            <input
              id="messages-chat-schedule-window-input"
              type="number"
              min="1"
              max="720"
              inputmode="numeric"
              placeholder="默认 30 分钟"
              autocomplete="off"
            />
            <small class="messages-form-field__hint">
              用于判断双方当前进行中、刚结束或即将开始的日程；若最近对话已主动提起同一行程，则会自动降低重复提醒。
            </small>
          </label>

          <label class="messages-toggle-field">
            <div class="messages-toggle-field__body">
              <strong>近期热点</strong>
              <p>开启后，可从论坛某个自定义页签挂载近期热点内容给 AI。</p>
            </div>
            <span class="messages-switch">
              <input id="messages-chat-hot-topics-input" type="checkbox" />
              <span class="messages-switch__slider"></span>
            </span>
          </label>

          <label class="messages-form-field">
            <span>热点挂载页签</span>
            <select id="messages-chat-hot-topics-tab-select"></select>
            <small class="messages-form-field__hint">
              请选择论坛中的一个自定义页签，作为“近期热点”来源。
            </small>
          </label>

          <section class="messages-form-field">
            <div class="messages-form-field__head">
              <span>挂载内容</span>
              <small id="messages-chat-hot-topics-warning" class="messages-form-field__inline-note"></small>
            </div>
            <div class="messages-checkbox-group">
              <label class="messages-checkbox-option">
                <input id="messages-chat-hot-topics-text-input" type="checkbox" />
                <span>页签文本</span>
              </label>
              <label class="messages-checkbox-option">
                <input id="messages-chat-hot-topics-topic-input" type="checkbox" />
                <span>页签热点</span>
              </label>
            </div>
            <small class="messages-form-field__hint">
              至少选择一项；两项可同时挂载。
            </small>
          </section>

          <label class="messages-toggle-field">
            <div class="messages-toggle-field__body">
              <strong>世界书挂载</strong>
              <p>开启后，可从“世界书”里同时挂载多条纯文本设定给 AI。</p>
            </div>
            <span class="messages-switch">
              <input id="messages-chat-worldbook-enabled-input" type="checkbox" />
              <span class="messages-switch__slider"></span>
            </span>
          </label>

          <section class="messages-form-field">
            <span>挂载的世界书</span>
            <div id="messages-chat-worldbook-list" class="messages-worldbook-selector"></div>
            <small class="messages-form-field__hint">
              可同时选择多条世界书；如果还没有内容，请先到“我 → 世界书”中创建。
            </small>
          </section>

          <label class="messages-toggle-field">
            <div class="messages-toggle-field__body">
              <strong>用户 INS 关注</strong>
              <p>开启后，会附带用户最近一条主动发送的论坛帖子主题。</p>
            </div>
            <span class="messages-switch">
              <input id="messages-chat-profile-post-focus-input" type="checkbox" />
              <span class="messages-switch__slider"></span>
            </span>
          </label>

          <label class="messages-toggle-field">
            <div class="messages-toggle-field__body">
              <strong>用户 Bubble 关注</strong>
              <p>开启后，会附带用户最近一轮 Bubble 发言，按粉丝回复分段切分。</p>
            </div>
            <span class="messages-switch">
              <input id="messages-chat-bubble-focus-input" type="checkbox" />
              <span class="messages-switch__slider"></span>
            </span>
          </label>

          <section class="messages-form-field">
            <div class="messages-form-field__head">
              <span>聊天头像显示</span>
            </div>
            <div class="messages-checkbox-group">
              <label class="messages-checkbox-option">
                <input id="messages-chat-show-contact-avatar-input" type="checkbox" />
                <span>显示角色头像</span>
              </label>
              <label class="messages-checkbox-option">
                <input id="messages-chat-show-user-avatar-input" type="checkbox" />
                <span>显示用户头像</span>
              </label>
            </div>
            <small class="messages-form-field__hint">
              关闭后，对应一侧的聊天头像会在对话页隐藏，仅保留气泡。
            </small>
          </section>

          <p
            id="messages-chat-settings-status"
            class="messages-editor-status"
            aria-live="polite"
          ></p>
        </form>
      </div>
    </section>

    <section id="messages-worldbook-modal" class="messages-sheet-modal" hidden aria-hidden="true">
      <div
        class="messages-sheet-modal__panel messages-sheet-modal__panel--worldbook"
        role="dialog"
        aria-modal="true"
        aria-label="世界书"
      >
        <header class="messages-sheet-modal__header">
          <button
            id="messages-worldbook-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭世界书"
          >
            返回
          </button>
          <strong>世界书</strong>
          <div class="messages-worldbook-header__actions">
            <button
              id="messages-worldbook-add-category-btn"
              class="messages-worldbook-header__button"
              type="button"
              aria-label="新增分类"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M4.5 7.5A2.5 2.5 0 0 1 7 5h3l1.4 1.6H17A2.5 2.5 0 0 1 19.5 9v8A2.5 2.5 0 0 1 17 19.5H7A2.5 2.5 0 0 1 4.5 17Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 10v6M9 13h6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <button
              id="messages-worldbook-add-entry-btn"
              class="messages-worldbook-header__button"
              type="button"
              aria-label="新增世界书"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M7 4.8h7.5L18 8.3V18a2 2 0 0 1-2 2H7.8a2 2 0 0 1-2-2V6.8a2 2 0 0 1 2-2Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M14.5 4.8V8H18M12 11v5M9.5 13.5h5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </header>

        <p id="messages-worldbook-status" class="messages-editor-status messages-worldbook-status"></p>
        <section id="messages-worldbook-list" class="messages-worldbook-list" aria-live="polite"></section>
      </div>
    </section>

    <section
      id="messages-worldbook-editor-modal"
      class="messages-sheet-modal"
      hidden
      aria-hidden="true"
    >
      <div
        class="messages-sheet-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-label="编辑世界书"
      >
        <header class="messages-sheet-modal__header">
          <button
            id="messages-worldbook-editor-close-btn"
            class="messages-sheet-modal__button"
            type="button"
            aria-label="关闭世界书编辑"
          >
            取消
          </button>
          <strong id="messages-worldbook-editor-title">新增世界书</strong>
          <button
            id="messages-worldbook-editor-save-btn"
            class="messages-sheet-modal__button messages-sheet-modal__button--primary"
            type="submit"
            form="messages-worldbook-editor-form"
          >
            保存
          </button>
        </header>

        <form id="messages-worldbook-editor-form" class="messages-editor-form">
          <label id="messages-worldbook-name-field" class="messages-form-field">
            <span id="messages-worldbook-name-label">世界书昵称</span>
            <input
              id="messages-worldbook-name-input"
              type="text"
              maxlength="40"
              placeholder="输入世界书昵称"
              autocomplete="off"
            />
          </label>

          <label id="messages-worldbook-category-field" class="messages-form-field">
            <span>分类</span>
            <select id="messages-worldbook-category-select"></select>
          </label>

          <label
            id="messages-worldbook-text-field"
            class="messages-form-field messages-form-field--textarea"
          >
            <span>世界书内容</span>
            <textarea
              id="messages-worldbook-text-input"
              rows="7"
              maxlength="4000"
              placeholder="输入世界书内容，内容为纯文本，会作为对话的背景设定。"
            ></textarea>
          </label>
